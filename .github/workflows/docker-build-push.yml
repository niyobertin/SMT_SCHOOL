name: Build and Deploy

on:
  push:
    branches: [ main, master ]
    paths:
      - 'smart-school-fn/**'
      - 'smart-school-bn/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository }}/smart-school-frontend
  BACKEND_IMAGE: ${{ github.repository }}/smart-school-backend
  DB_IMAGE: postgres:14

jobs:
  build-and-push:
    name: Build and Push Containers
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Frontend Build
      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./smart-school-fn
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=ghac,mode=max

      # Backend Build
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./smart-school-bn
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=ghac,mode=max

      # Run tests
      - name: Run Backend Tests
        if: github.event_name == 'pull_request'
        working-directory: ./smart-school-bn
        run: |
          npm ci
          npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          JWT_SECRET: test-secret

      - name: Run Frontend Tests
        if: github.event_name == 'pull_request'
        working-directory: ./smart-school-fn
        run: |
          npm ci
          npm test -- --watchAll=false

      # Deploy (example for production)
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          # Add your deployment commands here
          # Example:
          # ssh user@server "cd /path/to/app && docker-compose pull && docker-compose up -d"
          echo "Deployment would happen here"
