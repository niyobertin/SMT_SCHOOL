<!doctype html>

  <head>

    <link rel="icon" type="image/svg+xml" href="/nbglogo.png" />

    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JobExam Rwanda - Rwanda's Leading Exam Preparation & Career Development Platform" />
    <meta property="og:description" content="Pass Exams. Build Skills. Advance Your Career. JobExam Rwanda empowers students, graduates, job seekers, and professionals with comprehensive exam preparation resources, practical learning materials, and career-focused training designed to improve academic performance, professional competence, and employment opportunities. Whether you are preparing for government recruitment exams, professional certification assessments, university entrance examinations, or workplace competency tests, JobExam Rwanda provides the tools, guidance, and practice you need to succeed. One Platform. Unlimited Opportunities." />
    <meta property="og:url" content="https://jobexam.rw/" />
    <meta property="og:site_name" content="JobExam Rwanda" />
    <meta property="og:locale" content="en_RW" />
    <meta property="og:image" content="https://jobexam.rw/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="JobExam Rwanda - Exam Preparation & Career Development" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@jobexamrw" />
    <meta name="twitter:title" content="JobExam Rwanda - Rwanda's Leading Exam Preparation & Career Development Platform" />
    <meta name="twitter:description" content="Pass Exams. Build Skills. Advance Your Career. One Platform. Unlimited Opportunities. Rwanda's premier exam preparation and career development platform." />
    <meta name="twitter:image" content="https://jobexam.rw/og-image.jpg" />
    <meta name="twitter:image:alt" content="JobExam Rwanda Platform" />

    <!-- Structured Data (JSON-LD) - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "JobExam Rwanda",
      "description": "Rwanda's leading exam preparation and career development platform empowering students and professionals with comprehensive study resources, practice materials, and career-focused training.",
      "url": "https://jobexam.rw/",
      "areaServed": "RW",
      "foundingDate": "2024",
      "knowsAbout": ["Exam Preparation", "Career Development", "Professional Certification", "Job Training", "CPA Rwanda", "Government Exams Rwanda"],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "RW"
      },
      "sameAs": [
        "https://www.facebook.com/jobexamrw",
        "https://twitter.com/jobexamrw"
      ],
      "logo": {
        "@type": "ImageObject",
        "url": "https://jobexam.rw/logo.png"
      }
    }
    </script>

    <!-- Structured Data (JSON-LD) - WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "JobExam Rwanda",
      "url": "https://jobexam.rw/",
      "description": "Rwanda's Leading Exam Preparation & Career Development Platform. Pass Exams. Build Skills. Advance Your Career.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://jobexam.rw/courses?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data (JSON-LD) - BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://jobexam.rw/" },
        { "@type": "ListItem", "position": 2, "name": "Courses", "item": "https://jobexam.rw/courses" },
        { "@type": "ListItem", "position": 3, "name": "Pricing", "item": "https://jobexam.rw/tuition" }
      ]
    }
    </script>

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.jobexam.rw" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
